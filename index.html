<title>TRACK BUD Voice</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:#0a0c10;color:#e8eaed;min-height:100vh;display:flex;flex-direction:column}
header{padding:14px 16px;border-bottom:1px solid #1c212b;display:flex;justify-content:space-between;align-items:center}
.brand{font-size:15px;font-weight:800;letter-spacing:1px;color:#fff}
.brand span{color:#e0552b}
#reset{font-size:12px;color:#8a909c;background:none;border:1px solid #2a2f3a;border-radius:8px;padding:6px 10px}
#log{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:11px 14px;border-radius:14px;font-size:15px;line-height:1.45;white-space:pre-wrap}
.me{align-self:flex-end;background:#e0552b;color:#fff;border-bottom-right-radius:4px}
.ai{align-self:flex-start;background:#161b24;border:1px solid #232a36;border-bottom-left-radius:4px}
.sys{align-self:center;color:#6b7280;font-size:12px;font-style:italic}
.dots{display:inline-block}
.dots span{animation:b 1.2s infinite}.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes b{0%,60%,100%{opacity:.3}30%{opacity:1}}
footer{padding:14px 16px 22px;border-top:1px solid #1c212b;display:flex;flex-direction:column;align-items:center;gap:8px}
#mic{width:74px;height:74px;border-radius:50%;border:none;background:#e0552b;color:#fff;font-size:30px;box-shadow:0 4px 18px rgba(224,85,43,.4)}
#mic.on{background:#c0392b;animation:pulse 1.2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(224,85,43,.5)}70%{box-shadow:0 0 0 18px rgba(224,85,43,0)}100%{box-shadow:0 0 0 0 rgba(224,85,43,0)}}
.hint{font-size:12px;color:#6b7280}
#typebar{display:flex;gap:8px;width:100%}
#txt{flex:1;background:#161b24;border:1px solid #232a36;border-radius:10px;color:#fff;padding:10px 12px;font-size:14px}
#send{background:#232a36;border:none;border-radius:10px;color:#fff;padding:0 16px;font-size:14px}
</style>
</head>
<body>
<header>
<div class="brand">TRACK <span>BUD</span> VOICE</div>

</footer>

const log=document.getElementById('log'),mic=document.getElementById('mic'),hint=document.getElementById('hint'),txt=document.getElementById('txt');
let history=[];

const SYS="You are a field assistant for Erich, a construction project manager at In-N-Out Burger. You have his TRACK BUD project data as JSON keyed by store number. Each store has a list of projects with: project (work type), bid (dollar cost), date (scheduled project date, or null if not scheduled). Answer his questions about this data: lookups, costs, dates, comparisons, totals, which jobs are unscheduled, etc. Reason over the data when asked. Keep answers SHORT and spoken-friendly - he hears them aloud in the field while driving. No markdown, no bullet symbols, plain spoken sentences. If a store number isn't in the data, say it's not in the list. DATA: "+JSON.stringify(DATA);

function add(role,text){
  const d=document.createElement('div');
  d.className='msg '+(role==='user'?'me':'ai');
  d.textContent=text;
  log.appendChild(d);log.scrollTop=log.scrollHeight;
  return d;
}
function speak(t){
  if(!('speechSynthesis' in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);u.rate=1.02;speechSynthesis.speak(u);
}

async function ask(q){
  add('user',q);
  history.push({role:'user',content:q});
  const thinking=add('assistant','');
  thinking.innerHTML='<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:SYS,messages:history})
    });
    const data=await r.json();
    const ans=data.content.filter(b=>b.type==='text').map(b=>b.text).join(' ').trim();
    thinking.textContent=ans;
    history.push({role:'assistant',content:ans});
    speak(ans);
  }catch(e){
    thinking.textContent='Could not reach the brain. Check your signal and try again.';
  }
  log.scrollTop=log.scrollHeight;
}

// voice
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
  const rec=new SR();rec.lang='en-US';rec.interimResults=false;
  mic.onclick=()=>{try{speechSynthesis.cancel();rec.start();mic.classList.add('on');hint.textContent='Listening...';}catch(e){}};
  rec.onresult=e=>{const t=e.results[0][0].transcript;ask(t);};
  rec.onend=()=>{mic.classList.remove('on');hint.textContent='Tap, ask anything about your stores';};
  rec.onerror=ev=>{mic.classList.remove('on');hint.textContent=ev.error==='not-allowed'?'Mic blocked - allow mic in Chrome':'No signal for voice - type instead';};
}else{mic.style.display='none';hint.textContent='Voice not supported here - type below';}

document.getElementById('send').onclick=()=>{if(txt.value.trim()){ask(txt.value.trim());txt.value='';}};
txt.addEventListener('keydown',e=>{if(e.key==='Enter'&&txt.value.trim()){ask(txt.value.trim());txt.value='';}});
document.getElementById('reset').onclick=()=>{history=[];log.innerHTML='';add('assistant','Cleared. Ask me anything.');};
add('assistant','Ready. Ask me about any store - lookups, costs, dates, comparisons.');
